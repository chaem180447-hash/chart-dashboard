<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Project Progress</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  font-family: Arial, sans-serif;
  margin:20px;
}

#progressChart{
  width:100%;
  height:450px;
}
</style>

</head>

<body>

<h2>Project Progress</h2>

<canvas id="progressChart"></canvas>

<script>

const ctx = document.getElementById("progressChart");

fetch("https://opensheet.elk.sh/1haJsUtEdeS9VlBKnswXW_Q1jw9upxgaj7t-_ulD8Vg8/Projects")

.then(response => response.json())

.then(data => {

const labels = [];
const ceData = [];
const mepData = [];
const spData = [];

data.forEach(row => {

if(row["Project Name"]){

labels.push(row["Project Name"]);

ceData.push(parseFloat(row["Graph_CE_Progress_DB"]) || 0);
mepData.push(parseFloat(row["Graph_MEP_Progress_DB"]) || 0);
spData.push(parseFloat(row["Graph_SP_Progress_DB"]) || 0);

}

});

new Chart(ctx,{
type:"bar",
data:{
labels:labels,
datasets:[
{
label:"CE",
data:ceData,
backgroundColor:"#4e79a7"
},
{
label:"MEP",
data:mepData,
backgroundColor:"#e15759"
},
{
label:"SP",
data:spData,
backgroundColor:"#f28e2c"
}
]
},
options:{
indexAxis:"y",
responsive:true,
scales:{
x:{
beginAtZero:true,
max:100
}
}
}
});

})

.catch(error => {
console.error("Error loading data:", error);
});

</script>

</body>
</html>
