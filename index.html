<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  font-family: Arial, sans-serif;
  margin:20px;
}

#progressChart{
  width:100%;
  height:450px;
}
</style>

</head>

<body>

<canvas id="progressChart"></canvas>

<script>

window.onload = function(){

const ctx = document.getElementById("progressChart");

const labels = [];
const ceData = [];
const mepData = [];
const spData = [];

fetch("https://opensheet.elk.sh/1haJsUtEdeS9VlBKnswXW_Q1jw9upxgaj7t-_ulD8Vg8/Projects?nocache=" + new Date().getTime())

.then(res => res.json())

.then(data => {

data.forEach(row => {

if(row["Project Name"]){

labels.push(row["Project Name"]);

const ce = row["Graph_CE_Progress_DB"];
const mep = row["Graph_MEP_Progress_DB"];

let sp = null;

Object.keys(row).forEach(key=>{
if(key.includes("Graph_SP_Progress_DB")){
sp = row[key];
}
});

ceData.push(Number(ce) || 0);
mepData.push(Number(mep) || 0);
spData.push(Number(sp) || 0);

}

});

new Chart(ctx,{
type:"bar",

data:{
labels:labels,
datasets:[

{
label:"CE",
data:ceData,
backgroundColor:"#4e79a7"
},

{
label:"MEP",
data:mepData,
backgroundColor:"#e15759"
},

{
label:"SP",
data:spData,
backgroundColor:"#f28e2c"
}

]
},

options:{
indexAxis:"y",
responsive:true,
plugins:{
legend:{
position:"top"
}
},
scales:{
x:{
beginAtZero:true,
max:100
}
}
}

});

});

};

</script>

</body>
</html>
